name: Build Termux Python Wheels (Boss Mode)

# তুই চাইলে গিটহাব ওয়েবসাইট থেকে ম্যানুয়ালি বোতাম টিপে এটা চালাতে পারবি (workflow_dispatch)
on:
  workflow_dispatch:
    inputs:
      package_name:
        description: 'কোন প্যাকেজ বিল্ড করবি? (যেমন: pydantic-core==2.41.5)'
        required: true
        default: 'pydantic-core==2.41.5'

jobs:
  build-for-termux:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up QEMU for ARM64 (Termux Architecture)
        uses: docker/setup-qemu-action@v3

      - name: 🚀 Build Wheel inside Termux Environment
        run: |
          # Termux-এর aarch64 ডকার ইমেজ নামিয়ে তার ভেতর বিল্ড করা হচ্ছে
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/termux/termux-docker:aarch64 \
            bash -c "pkg update -y && \
                     pkg install -y python rust binutils clang make && \
                     pip wheel ${{ github.event.inputs.package_name }} --no-cache-dir"

      - name: 📦 Upload Wheel as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-built-wheel
          path: ./*.whl
          retention-days: 5
